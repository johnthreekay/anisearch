services:
  anisearch:
    build: .
    # Or if published to GHCR/Docker Hub:
    # image: ghcr.io/john3k/anisearch:latest
    container_name: anisearch
    restart: unless-stopped
    network_mode: host
    ports:
      - "8978:8978"
    volumes:
      - ./config:/config
    environment:
      - TZ=America/Chicago
      # Override config.json values via env vars:
      # - ANISEARCH_APIKEY=your-api-key-here
      # - QBIT_URL=http://localhost:8080
      # - QBIT_USER=admin
      # - QBIT_PASS=adminadmin
      # - SONARR_URL=http://localhost:8989
      # - SONARR_APIKEY=your-sonarr-api-key
